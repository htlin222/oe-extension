<svg xmlns="http://www.w3.org/2000/svg" width="710" height="265" viewBox="0 0 710 265" role="img" aria-labelledby="title desc">
  <title id="title">OpenEvidence Selection Opener demo</title>
  <desc id="desc">A selected oncology paragraph with the Ask OpenEvidence, PICO, and ELI5 buttons floating above the highlighted text.</desc>
  <rect width="710" height="265" fill="#ffffff"/>

  <g font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#525252">
    <text x="16" y="20">survival of 3 to 4 months, a median overall survival of 6 to 7 months, and substantial toxic</text>
    <text x="16" y="42">effects.</text>
    <text x="66" y="38" fill="#2563eb" font-size="13">6,8-14</text>
  </g>

  <g fill="#b9dcff">
    <rect x="16" y="63" width="666" height="23" rx="1"/>
    <rect x="16" y="86" width="692" height="23" rx="1"/>
    <rect x="16" y="109" width="333" height="23" rx="1"/>
    <rect x="358" y="109" width="332" height="23" rx="1"/>
    <rect x="16" y="132" width="686" height="23" rx="1"/>
    <rect x="16" y="155" width="650" height="23" rx="1"/>
    <rect x="16" y="178" width="688" height="23" rx="1"/>
    <rect x="16" y="201" width="650" height="23" rx="1"/>
    <rect x="16" y="224" width="397" height="23" rx="1"/>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#3f3f46">
    <text x="16" y="80">Oncogenic mutations of the gene family that encodes rat sarcoma virus (RAS) are primary</text>
    <text x="16" y="103">drivers of PDAC that are present in more than 90% of tumors, and most of these mutations</text>
    <text x="16" y="126">(&gt;80%) involve substitutions at KRAS codon 12.</text>
    <text x="358" y="126">These alterations result in constitutive</text>
    <text x="16" y="149">activation of RAS with accumulation of the guanosine triphosphate (GTP)-bound state of</text>
    <text x="16" y="172">RAS, known as RAS(ON), which drives aberrant signaling.</text>
    <text x="16" y="195">Tumors lacking RAS mutations</text>
    <text x="16" y="218">and other clinically actionable mutations can also be dependent on RAS signaling through</text>
    <text x="16" y="241">genomic amplification or alteration in upstream or downstream components of the RAS-</text>
    <text x="16" y="264">mitogen-activated protein kinase (MAPK) pathway.</text>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#2563eb" font-size="13">
    <text x="360" y="121">15-18</text>
    <text x="548" y="167">18,19</text>
    <text x="404" y="239">20-22</text>
  </g>

  <g transform="translate(206 25)">
    <rect x="0" y="0" width="329" height="39" rx="7" fill="#1f1f1f" stroke="#383838"/>
    <rect x="4" y="4" width="153" height="31" rx="6" fill="#f97316" stroke="#ea580c"/>
    <rect x="163" y="4" width="72" height="31" rx="6" fill="#18181b" stroke="#383838"/>
    <rect x="241" y="4" width="84" height="31" rx="6" fill="#18181b" stroke="#383838"/>

    <g transform="translate(17 11)" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="6" cy="6" r="5"/>
      <path d="m10 10 4 4"/>
    </g>
    <text x="42" y="24" fill="#ffffff" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="700">Ask OpenEvidence</text>

    <g transform="translate(177 10)" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 6a2 2 0 1 1-4 0 4 4 0 0 1 8 0 6 6 0 0 1-12 0 8 8 0 0 1 16 0"/>
      <path d="M7 6v12"/>
    </g>
    <text x="202" y="24" fill="#ffffff" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="700">PICO</text>

    <g transform="translate(256 11)" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 1 6 4a2 2 0 0 1-1 1L2 6l3 1a2 2 0 0 1 1 1l1 3 1-3a2 2 0 0 1 1-1l3-1-3-1a2 2 0 0 1-1-1Z"/>
      <path d="M15 11v4"/>
      <path d="M17 13h-4"/>
    </g>
    <text x="286" y="24" fill="#ffffff" font-family="Inter, Arial, Helvetica, sans-serif" font-size="13" font-weight="700">ELI5</text>
  </g>
</svg>
