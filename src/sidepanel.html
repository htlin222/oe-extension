<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenEvidence</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <header class="panel-bar">
      <span id="panel-title" class="panel-title">OpenEvidence</span>
      <div class="panel-actions">
        <button type="button" id="open-settings" class="panel-action panel-action--icon" title="Settings" aria-label="Settings">
          <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <button type="button" id="open-tab" class="panel-action" title="Open in a new tab" aria-label="Open in a new tab" hidden>Open in tab</button>
        <button type="button" id="close-panel" class="panel-action panel-action--close" title="Close side pane" aria-label="Close side pane">Close</button>
      </div>
    </header>

    <p id="panel-empty" class="panel-empty">Select text on a page and choose <strong>Ask OpenEvidence</strong> to load a question here.</p>

    <iframe
      id="oe-frame"
      class="panel-frame"
      title="OpenEvidence"
      referrerpolicy="no-referrer"
      allow="clipboard-write"
      hidden
    ></iframe>

    <script src="sidepanel.js"></script>
  </body>
</html>
